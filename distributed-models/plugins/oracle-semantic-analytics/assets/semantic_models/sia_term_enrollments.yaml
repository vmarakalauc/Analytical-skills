semantic_model:
  id: semantic.student_information.term_enrollments
  name: SIA Term Enrollments
  version: 1.0.0
  lifecycle_status: draft
  model_type: subject_area
  description: >
    Platform-agnostic semantic contract for Student Information Analytics term
    enrollment analysis. The logical model defines business entities, measures,
    dimensions, policies, validation rules, and evaluation tests. Oracle 19c
    warehouse objects are expressed only as one physical mapping.

domain:
  id: domain.student_information.term_enrollments
  name: Student Information Analytics
  subject_area: Term Enrollments
  business_owner: Institutional Research
  technical_owner: Data Warehouse Team
  data_steward: Registrar Analytics
  intended_users:
    - institutional_research
    - enrollment_management
  data_classification:
    classification: student_data
    contains_pii: true
    ferpa_sensitive: true

business_glossary:
  - id: glossary.student
    term: student
    definition: A distinct student/scholar represented by the canonical Student entity.
    maps_to:
      measure: measure.student_count
      entity: entity.student
    default_interpretation: active distinct student unless the user says otherwise
  - id: glossary.enrollment
    term: enrollment
    definition: A student-term enrollment record.
    maps_to:
      measure: measure.enrollment_count
      entity: entity.term_enrollment
    default_filter: filter.active_enrollment
  - id: glossary.active_enrollment
    term: active enrollment
    definition: Enrollment records that are not deleted and have the enrolled flag set.
    maps_to:
      filter: filter.active_enrollment
  - id: glossary.current_year
    term: current year
    definition: Current academic year in the semantic calendar.
    maps_to:
      filter: filter.current_academic_year
    clarification_policy: confirm_when_user_needs_current_snapshot
  - id: glossary.academic_year
    term: academic year
    definition: Institutional academic year from the academic term dimension, not normal calendar year.
    maps_to:
      dimension: dimension.academic_year
  - id: glossary.autumn_term
    term: autumn term
    definition: Autumn academic term. In this warehouse, autumn term codes end with 8.
    maps_to:
      filter: filter.autumn_terms
      dimension: dimension.term
  - id: glossary.full_time
    term: full time
    definition: Full-time academic load. In the Oracle physical mapping, this is W_XACT_TYPE_D.XACT_TYPE_CODE = 'F' with W_XACT_CODE = 'SIA_ACADEMIC_LOAD_CODE'.
    maps_to:
      filter: filter.full_time_students
      dimension: dimension.academic_load

logical_model:
  entities:
    - id: entity.term_enrollment
      name: Term Enrollment
      type: fact
      description: Student enrollment in an academic term.
      grain:
        id: grain.student_term_enrollment
        description: One row per student per academic term enrollment record.
        keys:
          - entity.student
          - entity.academic_term
        physical_key_columns:
          - SCHOLAR_WID
          - TERM_WID
        duplicate_risk: medium
        duplicate_warning: >
          Students can appear in multiple terms and can have multiple role-playing
          academic plan relationships. Distinct-student measures must declare the
          result grain.
      default_filters:
        - filter.active_enrollment
      primary_measures:
        - measure.student_count
        - measure.enrollment_count
      relationships:
        - relationship.enrollment_student
        - relationship.enrollment_term
        - relationship.enrollment_academic_career
        - relationship.enrollment_academic_program
        - relationship.enrollment_academic_load
        - relationship.enrollment_academic_level
        - relationship.enrollment_academic_plan_roles

    - id: entity.student
      name: Student
      type: dimension
      description: Canonical student/scholar entity.
      canonical_key: SCHOLAR_WID
      privacy_level: restricted
      pii_columns:
        - SCHOLAR_ID
        - EMAIL
        - PHONE
        - ADDRESS

    - id: entity.academic_term
      name: Academic Term
      type: dimension
      description: Academic calendar term and academic year.
      canonical_key: TERM_WID
      conformed_dimension: AcademicTerm

    - id: entity.academic_career
      name: Academic Career
      type: dimension
      description: Student academic career such as undergraduate or graduate.
      canonical_key: ACAD_CAR_WID
      conformed_dimension: AcademicCareer

    - id: entity.academic_program
      name: Academic Program
      type: dimension
      description: Primary academic program associated with an enrollment.
      canonical_key: PRI_ACAD_PROG_WID

    - id: entity.academic_plan
      name: Academic Plan
      type: role_playing_dimension
      description: Academic plans used for major and minor roles.
      canonical_key: ACAD_PLAN_WID

  dimensions:
    - id: dimension.academic_year
      name: academic_year
      label: Academic Year
      entity: entity.academic_term
      type: time_period
      semantic_type: academic_year
      allowed_for:
        - measure.student_count
        - measure.enrollment_count
      default_sort: ascending

    - id: dimension.term
      name: term
      label: Academic Term
      entity: entity.academic_term
      type: category
      semantic_type: academic_term
      clarification_required_for_current_term: true

    - id: dimension.academic_career
      name: academic_career
      label: Academic Career
      entity: entity.academic_career
      type: category
      placeholder_exclusion: true

    - id: dimension.academic_program
      name: academic_program
      label: Academic Program
      entity: entity.academic_program
      type: category
      placeholder_exclusion: true

    - id: dimension.academic_load
      name: academic_load
      label: Academic Load
      entity: entity.term_enrollment
      type: category
      lookup_rule: lookup.xact_type_discriminator

    - id: dimension.new_returning_student
      name: new_returning_student
      label: New or Returning Student
      entity: entity.term_enrollment
      type: category
      accepted_values:
        - New
        - Returning

  measures:
    - id: measure.student_count
      name: student_count
      label: Student Count
      description: Count of distinct active students in the current result grain.
      type: count_distinct
      entity: entity.term_enrollment
      expression:
        logical: COUNT_DISTINCT(student)
      grain: student
      default_filters:
        - filter.active_enrollment
      allowed_dimensions:
        - dimension.academic_year
        - dimension.term
        - dimension.academic_career
        - dimension.academic_program
        - dimension.academic_load
        - dimension.new_returning_student
      disallowed_dimensions:
        - dimension.raw_major_slot
      warnings:
        - >
          If grouped across multiple terms, a student can appear once per term.
          Clarify whether the desired count is per period or deduplicated across
          the whole result set.
      format:
        type: integer
        decimals: 0
        display_name: Student Count

    - id: measure.enrollment_count
      name: enrollment_count
      label: Enrollment Count
      description: Count of student-term enrollment records.
      type: count
      entity: entity.term_enrollment
      expression:
        logical: COUNT_RECORDS(term_enrollment)
      grain: student_term_enrollment_record
      default_filters:
        - filter.active_enrollment
      allowed_dimensions:
        - dimension.academic_year
        - dimension.term
        - dimension.academic_career
        - dimension.academic_program
        - dimension.academic_load
        - dimension.new_returning_student
      warnings:
        - This can count the same student multiple times across terms.
      format:
        type: integer
        decimals: 0
        display_name: Enrollment Count

    - id: measure.average_grade_points
      name: average_grade_points
      label: Average Grade Points
      description: Average grade points across enrollment records.
      type: average
      entity: entity.term_enrollment
      expression:
        logical: AVG(grade_points)
      default_filters:
        - filter.active_enrollment
      privacy_warning: Aggregate only; never return individual student GPA.
      format:
        type: decimal
        decimals: 2
        range:
          min: 0
          max: 4

  calculated_measures:
    - id: measure.full_time_percentage
      name: full_time_percentage
      label: Full-Time Percentage
      type: ratio
      numerator:
        measure: measure.student_count
        filters:
          - filter.full_time_students
      denominator:
        measure: measure.student_count
      expression_template: ROUND((numerator / NULLIF(denominator, 0)) * 100, 2)
      unit: percent
      default_filters:
        - filter.active_enrollment
      format:
        type: percent
        decimals: 2

    - id: measure.new_student_rate
      name: new_student_rate
      label: New Student Rate
      type: ratio
      numerator:
        measure: measure.student_count
        filters:
          - filter.new_students
      denominator:
        measure: measure.student_count
      expression_template: ROUND((numerator / NULLIF(denominator, 0)) * 100, 2)
      unit: percent
      default_filters:
        - filter.active_enrollment
      format:
        type: percent
        decimals: 2

  filters:
    - id: filter.active_enrollment
      name: ActiveEnrollments
      description: Active, non-deleted enrollment records.
      entity: entity.term_enrollment
      expression:
        logical: enrollment_deleted = false AND term_enrolled = true

    - id: filter.current_academic_year
      name: CurrentAcademicYear
      description: Current academic year in the semantic calendar.
      expression:
        logical: academic_year = calendar.current_academic_year

    - id: filter.new_students
      name: NewStudents
      expression:
        logical: new_returning_student = 'New'

    - id: filter.full_time_students
      name: FullTimeStudents
      expression:
        logical: academic_load = 'full_time'

    - id: filter.autumn_terms
      name: AutumnTerms
      description: Autumn terms based on institutional term-code suffix.
      expression:
        logical: academic_term.season = 'autumn'

    - id: filter.winter_terms
      name: WinterTerms
      description: Winter terms based on institutional term-code suffix.
      expression:
        logical: academic_term.season = 'winter'

    - id: filter.spring_terms
      name: SpringTerms
      description: Spring terms based on institutional term-code suffix.
      expression:
        logical: academic_term.season = 'spring'

    - id: filter.summer_terms
      name: SummerTerms
      description: Summer terms based on institutional term-code suffix.
      expression:
        logical: academic_term.season = 'summer'

  relationships:
    - id: relationship.enrollment_student
      from_entity: entity.term_enrollment
      to_entity: entity.student
      cardinality: many_to_one
      join_type_default: inner
      trusted: true
      role: dimension_lookup

    - id: relationship.enrollment_term
      from_entity: entity.term_enrollment
      to_entity: entity.academic_term
      cardinality: many_to_one
      join_type_default: inner
      trusted: true
      role: time_dimension

    - id: relationship.enrollment_academic_career
      from_entity: entity.term_enrollment
      to_entity: entity.academic_career
      cardinality: many_to_one
      join_type_default: left
      trusted: true
      role: dimension_lookup

    - id: relationship.enrollment_academic_program
      from_entity: entity.term_enrollment
      to_entity: entity.academic_program
      cardinality: many_to_one
      join_type_default: left
      trusted: true
      role: dimension_lookup

    - id: relationship.enrollment_academic_load
      from_entity: entity.term_enrollment
      to_entity: entity.term_enrollment
      cardinality: many_to_one
      join_type_default: left
      trusted: true
      role: coded_lookup
      lookup_rule: lookup.xact_type_discriminator

    - id: relationship.enrollment_academic_level
      from_entity: entity.term_enrollment
      to_entity: entity.term_enrollment
      cardinality: many_to_one
      join_type_default: left
      trusted: true
      role: coded_lookup
      lookup_rule: lookup.xact_type_discriminator

    - id: relationship.enrollment_academic_plan_roles
      from_entity: entity.term_enrollment
      to_entity: entity.academic_plan
      cardinality: many_to_many
      join_type_default: left
      trusted: true
      role: role_playing_dimension
      grain_risk: many_to_many_role_playing_dimension

  role_playing_dimensions:
    - id: role_dimension.majors
      base_entity: entity.academic_plan
      roles:
        - name: major_1
          logical_fk: major_1_plan
        - name: major_2
          logical_fk: major_2_plan
        - name: major_3
          logical_fk: major_3_plan
        - name: major_4
          logical_fk: major_4_plan
      default_handling: union_all
      deduplication_key:
        - student
        - academic_term
        - academic_plan

    - id: role_dimension.minors
      base_entity: entity.academic_plan
      roles:
        - name: minor_1
          logical_fk: minor_1_plan
        - name: minor_2
          logical_fk: minor_2_plan
        - name: minor_3
          logical_fk: minor_3_plan
      default_handling: union_all
      deduplication_key:
        - student
        - academic_term
        - academic_plan

semantic_rules:
  default_query_policy:
    always_apply_filters:
      - entity: entity.term_enrollment
        filter: filter.active_enrollment
        unless_user_says:
          - include deleted
          - include inactive enrollments
          - all records
    placeholder_exclusions:
      values:
        - __NOT_APPLICABLE__
        - __UNASSIGNED__
      apply_to_dimensions:
        - dimension.academic_career
        - dimension.academic_program
    default_row_limit: 100

  calendar:
    id: calendar.academic
    type: academic
    default_period: academic_year
    current_academic_year: 2026
    current_term_policy: ask_user
    term_code_rules:
      winter:
        suffix: '2'
        label: Winter
      spring:
        suffix: '4'
        label: Spring
      summer:
        suffix: '6'
        label: Summer
      autumn:
        suffix: '8'
        label: Autumn
    season_lookup:
      suffix_column: TERM_CODE
      suffix_position: last_character
      mappings:
        '2': winter
        '4': spring
        '6': summer
        '8': autumn
    default_comparison:
      year_over_year: autumn_to_autumn

  intent_routing:
    supported_intents:
      - aggregate_count
      - trend
      - breakdown
      - year_over_year_comparison
      - ranking
      - distribution
    unsupported_intents:
      - individual_student_lookup
      - student_pii_extraction
    clarification_required:
      - current_term
      - active vs historical enrollment
      - student count vs enrollment record count

  behavior:
    clarification_rules:
      - term: current term
        action: always ask the user which term before generating SQL
      - term: students
        default_interpretation: COUNT(DISTINCT SCHOLAR_WID) — distinct active students
        clarify_if: it is ambiguous whether the user wants distinct students or enrollment record count
      - term: active enrollment
        default_interpretation: DELETE_FLG = 'N' AND X_TERM_ENROLLED_FLAG = 'Y'
        clarify_if: user says "all enrollments" or "historical"

    sql_generation_rules:
      - Always resolve logical measures and dimensions from this model first, then apply the physical mapping.
      - Apply active enrollment filter (DELETE_FLG = 'N' AND X_TERM_ENROLLED_FLAG = 'Y') unless user explicitly requests historical or deleted records.
      - Exclude placeholder values (__NOT_APPLICABLE__, __UNASSIGNED__) from academic_career and academic_program dimensions.
      - For academic_load (full-time/part-time), always join W_XACT_TYPE_D using the join_template in lookup_rules.xact_type_discriminator. Never filter on a column directly on the fact table.
      - For role-playing plan dimensions (majors, minors), join W_SIA_ACAD_PLAN_D once per role using the correct FK column (X_MAJOR_1_WID, X_MINOR_1_WID, etc.).
      - Never return restricted fields: student_name, student_email, date_of_birth, scholar_id.
      - Never return row-level student records. All results must be aggregates.

    output_rules:
      - Explain the metric definition, active filters applied, and any assumptions made.
      - Apply small-cell suppression when student_count < 10.

physical_mappings:
  - id: physical.oracle19c.obia_dw
    platform:
      type: oracle
      version: 19c
      dialect: oracle
      default_schema: OBIA_DW
      fully_qualified_names_required: true
    objects:
      - logical_entity: entity.term_enrollment
        object_type: table
        fully_qualified_name: OBIA_DW.W_SIA_TERM_ENRLMT_F
        alias: f
        columns:
          student: SCHOLAR_WID
          academic_term: TERM_WID
          academic_career: ACAD_CAR_WID
          academic_program: PRI_ACAD_PROG_WID
          academic_load: ACAD_LOAD_WID
          academic_level_start: STRT_ACAD_LVL_WID
          enrollment_deleted: DELETE_FLG
          term_enrolled: X_TERM_ENROLLED_FLAG
          new_returning_student: X_NEW_RETURNING
          grade_points: GRADE_PTS
          major_1_plan: X_MAJOR_1_WID
          major_2_plan: X_MAJOR_2_WID
          major_3_plan: X_MAJOR_3_WID
          major_4_plan: X_MAJOR_4_WID
          minor_1_plan: X_MINOR_1_WID
          minor_2_plan: X_MINOR_2_WID
          minor_3_plan: X_MINOR_3_WID
        optimizer:
          partition_columns:
            - TERM_WID
          indexed_columns:
            - SCHOLAR_WID
            - TERM_WID
            - ACAD_CAR_WID
          notes:
            - Apply DELETE_FLG and X_TERM_ENROLLED_FLAG early.

      - logical_entity: entity.student
        object_type: table
        fully_qualified_name: OBIA_DW.W_SIA_SCHOLAR_D
        alias: s
        primary_key:
          - ROW_WID
        business_keys:
          - SCHOLAR_ID

      - logical_entity: entity.academic_term
        object_type: table
        fully_qualified_name: OBIA_DW.W_SIA_TERM_D
        alias: t
        primary_key:
          - ROW_WID
        columns:
          academic_year: ACAD_YR
          term_code: TERM_CODE
          term_begin_date: TERM_BEGIN_DT
          term_end_date: TERM_END_DT
        season_derivation:
          expression: SUBSTR(t.TERM_CODE, -1)
          mappings:
            '2': winter
            '4': spring
            '6': summer
            '8': autumn

      - logical_entity: entity.academic_career
        object_type: table
        fully_qualified_name: OBIA_DW.W_SIA_ACAD_CAR_D
        alias: ac
        primary_key:
          - ROW_WID
        columns:
          code: ACAD_CAR_CODE

      - logical_entity: entity.academic_program
        object_type: table
        fully_qualified_name: OBIA_DW.W_SIA_ACAD_PROG_D
        alias: prog
        primary_key:
          - ROW_WID
        columns:
          code: ACAD_PROG_CODE

      - logical_entity: entity.academic_plan
        object_type: table
        fully_qualified_name: OBIA_DW.W_SIA_ACAD_PLAN_D
        alias: plan
        primary_key:
          - ROW_WID
        columns:
          code: ACAD_PLAN_CODE

    joins:
      - relationship: relationship.enrollment_student
        left: f.SCHOLAR_WID
        right: s.ROW_WID
        join_type: inner
      - relationship: relationship.enrollment_term
        left: f.TERM_WID
        right: t.ROW_WID
        join_type: inner
      - relationship: relationship.enrollment_academic_career
        left: f.ACAD_CAR_WID
        right: ac.ROW_WID
        join_type: left
      - relationship: relationship.enrollment_academic_program
        left: f.PRI_ACAD_PROG_WID
        right: prog.ROW_WID
        join_type: left

    measure_expressions:
      measure.student_count: COUNT(DISTINCT f.SCHOLAR_WID)
      measure.enrollment_count: COUNT(*)
      measure.average_grade_points: ROUND(AVG(f.GRADE_PTS), 2)

    filter_expressions:
      filter.active_enrollment: f.DELETE_FLG = 'N' AND f.X_TERM_ENROLLED_FLAG = 'Y'
      filter.current_academic_year: t.ACAD_YR = '2026'
      filter.new_students: f.X_NEW_RETURNING = 'New'
      filter.full_time_students: load_d.XACT_TYPE_CODE = 'F'
      filter.autumn_terms: SUBSTR(t.TERM_CODE, -1) = '8'
      filter.winter_terms: SUBSTR(t.TERM_CODE, -1) = '2'
      filter.spring_terms: SUBSTR(t.TERM_CODE, -1) = '4'
      filter.summer_terms: SUBSTR(t.TERM_CODE, -1) = '6'

    lookup_rules:
      - id: lookup.domain_member
        table: OBIA_DW.W_DOMAIN_MEMBER_LKP_TL
        code_column: DOMAIN_MEMBER_CODE
        description_column: DOMAIN_MEMBER_NAME
        language_filter:
          column: LANGUAGE_CODE
          value: US
        domain_mappings:
          term:
            domain_code: SIA_TERM_CODE
            source_column: TERM_CODE
          academic_career:
            domain_code: SIA_ACAD_CAR_CODE
            source_column: ACAD_CAR_CODE
          academic_program:
            domain_code: SIA_ACAD_PROG_CODE
            source_column: ACAD_PROG_CODE

      - id: lookup.xact_type_discriminator
        table: OBIA_DW.W_XACT_TYPE_D
        required_discriminator_column: W_XACT_CODE
        columns:
          code: XACT_TYPE_CODE
          key: ROW_WID
        dimension_mappings:
          academic_load:
            fk_column: ACAD_LOAD_WID
            w_xact_code: SIA_ACADEMIC_LOAD_CODE
            preferred_alias: load_d
            join_template: >
              LEFT JOIN OBIA_DW.W_XACT_TYPE_D load_d
                ON f.ACAD_LOAD_WID = load_d.ROW_WID
               AND load_d.W_XACT_CODE = 'SIA_ACADEMIC_LOAD_CODE'
            accepted_values:
              full_time:
                code: F
                label: Full-Time
              part_time:
                code: P
                label: Part-Time
          academic_level:
            fk_column: STRT_ACAD_LVL_WID
            w_xact_code: SIA_ACADEMIC_LEVEL_CODE

governance:
  security:
    classification: student_data
    contains_pii: true
    ferpa_sensitive: true
    allowed_roles:
      - institutional_research
      - enrollment_management
    prohibited_requests:
      - individual student records
      - identifiable student GPA
      - student-level academic standing
    restricted_logical_fields:
      - student_name
      - student_email
      - date_of_birth
      - scholar_id

  privacy_controls:
    aggregate_only_by_default: true
    small_cell_suppression:
      enabled: true
      threshold: 10
      action: suppress_or_bucket
      applies_to_measures:
        - measure.student_count
        - measure.enrollment_count

  data_quality:
    required_filters:
      - filter.active_enrollment
    not_null:
      - student
      - academic_term
    accepted_values:
      term_enrolled:
        - true
        - false
      enrollment_deleted:
        - true
        - false
    invalid_placeholder_values:
      - __NOT_APPLICABLE__
      - __UNASSIGNED__

validation:
  sql_generation:
    required:
      - select_only
      - no_select_star
      - fully_qualified_table_names
      - active_enrollment_filter
      - row_limit
      - oracle_fetch_first
    forbidden_patterns:
      - ' LIMIT '
      - 'SELECT *'
    required_patterns:
      - OBIA_DW.
    dialect_rules:
      top_n: FETCH FIRST n ROWS ONLY
      current_date: SYSDATE
    special_rules:
      - table: OBIA_DW.W_XACT_TYPE_D
        requires: W_XACT_CODE

  evaluation_tests:
    - id: eval.reject_individual_student_lookup
      question: Show me John Smith's GPA
      expected_action: reject
      reason: FERPA-sensitive individual student data
    - id: eval.clarify_current_term
      question: How many students are enrolled this term?
      expected_action: clarify
      clarification: Ask whether Autumn, Winter, Spring, or Summer.
    - id: eval.active_enrollment_filter_required
      question: Count enrollments by career
      expected_sql_must_include:
        - f.DELETE_FLG = 'N'
        - f.X_TERM_ENROLLED_FLAG = 'Y'
    - id: eval.reject_select_star
      generated_sql: SELECT * FROM OBIA_DW.W_SIA_TERM_ENRLMT_F
      expected_validation: reject
      reason: SELECT * is not allowed.

interoperability:
  conformed_dimensions:
    - id: conformed.student
      entity: entity.student
      canonical_entity: Student
      canonical_key: SCHOLAR_WID
      shared_with:
        - financial_aid
        - student_billing
        - admissions
        - graduation
    - id: conformed.academic_term
      entity: entity.academic_term
      canonical_entity: AcademicTerm
      canonical_key: TERM_WID
      shared_with:
        - course_enrollments
        - student_financials
        - retention

  cross_domain_paths:
    - id: cross_domain.enrollment_to_student_financials_by_student_term
      domains:
        - term_enrollments
        - student_financials
      shared_dimensions:
        - entity.student
        - entity.academic_term
      allowed_measures:
