# ==============================================================================
# VERIFIED QUERIES
# ==============================================================================
verified_queries:
  - name: total_enrollment_current_year
    question: What is the total enrollment for the current academic year?
    sql: |-
      SELECT
        COUNT(DISTINCT f.SCHOLAR_WID) as student_count,
        COUNT(*) as enrollment_count
      FROM OBIA_DW.W_SIA_TERM_ENRLMT_F f
      JOIN OBIA_DW.W_SIA_TERM_D t ON f.TERM_WID = t.ROW_WID
      WHERE f.DELETE_FLG = 'N'
        AND f.X_TERM_ENROLLED_FLAG = 'Y'
        AND t.ACAD_YR = '2026'
    use_as_onboarding_question: true
    verified_by: System
    verified_at: 1740441600

  - name: new_vs_returning_breakdown
    question: How many new versus returning students are enrolled this year?
    sql: |-
      SELECT
        f.X_NEW_RETURNING as student_type,
        COUNT(DISTINCT f.SCHOLAR_WID) as student_count
      FROM OBIA_DW.W_SIA_TERM_ENRLMT_F f
      JOIN OBIA_DW.W_SIA_TERM_D t ON f.TERM_WID = t.ROW_WID
      WHERE f.DELETE_FLG = 'N'
        AND f.X_TERM_ENROLLED_FLAG = 'Y'
        AND t.ACAD_YR = '2026'
      GROUP BY f.X_NEW_RETURNING
      ORDER BY f.X_NEW_RETURNING
    use_as_onboarding_question: true
    verified_by: System
    verified_at: 1740441600

  - name: enrollment_by_academic_career
    question: Show me enrollment by academic career
    sql: |-
      SELECT
        ac.ACAD_CAR_CODE as career_code,
        COUNT(DISTINCT f.SCHOLAR_WID) as student_count,
        COUNT(*) as enrollment_count
      FROM OBIA_DW.W_SIA_TERM_ENRLMT_F f
      JOIN OBIA_DW.W_SIA_ACAD_CAR_D ac ON f.ACAD_CAR_WID = ac.ROW_WID
      JOIN OBIA_DW.W_SIA_TERM_D t ON f.TERM_WID = t.ROW_WID
      WHERE f.DELETE_FLG = 'N'
        AND f.X_TERM_ENROLLED_FLAG = 'Y'
        AND t.ACAD_YR = '2026'
      GROUP BY ac.ACAD_CAR_CODE
      ORDER BY student_count DESC
    use_as_onboarding_question: true
    verified_by: System
    verified_at: 1740441600

  - name: enrollment_by_academic_load
    question: What is the enrollment breakdown by academic load (full-time vs part-time)?
    sql: |-
      SELECT
        al.XACT_TYPE_CODE as load_code,
        COUNT(DISTINCT f.SCHOLAR_WID) as student_count
      FROM OBIA_DW.W_SIA_TERM_ENRLMT_F f
      JOIN OBIA_DW.W_XACT_TYPE_D al ON f.ACAD_LOAD_WID = al.ROW_WID
      JOIN OBIA_DW.W_SIA_TERM_D t ON f.TERM_WID = t.ROW_WID
      WHERE f.DELETE_FLG = 'N'
        AND f.X_TERM_ENROLLED_FLAG = 'Y'
        AND al.W_XACT_CODE = 'SIA_ACADEMIC_LOAD_CODE'
        AND t.ACAD_YR = '2026'
      GROUP BY al.XACT_TYPE_CODE
      ORDER BY student_count DESC
    use_as_onboarding_question: true
    verified_by: System
    verified_at: 1740441600

  - name: enrollment_by_term_and_type
    question: Show me enrollment by term and student type for Fall 2026
    sql: |-
      SELECT
        t.TERM_CODE,
        t.ACAD_YR as academic_year,
        f.X_NEW_RETURNING as student_type,
        COUNT(DISTINCT f.SCHOLAR_WID) as student_count
      FROM OBIA_DW.W_SIA_TERM_ENRLMT_F f
      JOIN OBIA_DW.W_SIA_TERM_D t ON f.TERM_WID = t.ROW_WID
      WHERE f.DELETE_FLG = 'N'
        AND f.X_TERM_ENROLLED_FLAG = 'Y'
        AND t.ACAD_YR = '2026'
        AND t.TERM_CODE LIKE '%3'
      GROUP BY t.TERM_CODE, t.ACAD_YR, f.X_NEW_RETURNING
      ORDER BY t.TERM_CODE, f.X_NEW_RETURNING
    use_as_onboarding_question: false
    verified_by: System
    verified_at: 1740441600

  - name: enrollment_by_academic_level
    question: Show me how many students are at each academic level this year
    sql: |-
      SELECT
        lvl.XACT_TYPE_CODE as level_code,
        COUNT(DISTINCT f.SCHOLAR_WID) as student_count
      FROM OBIA_DW.W_SIA_TERM_ENRLMT_F f
      JOIN OBIA_DW.W_XACT_TYPE_D lvl ON f.STRT_ACAD_LVL_WID = lvl.ROW_WID
      JOIN OBIA_DW.W_SIA_TERM_D t ON f.TERM_WID = t.ROW_WID
      WHERE f.DELETE_FLG = 'N'
        AND f.X_TERM_ENROLLED_FLAG = 'Y'
        AND lvl.W_XACT_CODE = 'SIA_ACADEMIC_LEVEL_CODE'
        AND t.ACAD_YR = '2026'
      GROUP BY lvl.XACT_TYPE_CODE
      ORDER BY student_count DESC
    use_as_onboarding_question: false
    verified_by: System
    verified_at: 1740441600

  - name: year_over_year_comparison
    question: Compare total enrollment between 2025 and 2026
    sql: |-
      SELECT
        t.ACAD_YR as academic_year,
        COUNT(DISTINCT f.SCHOLAR_WID) as student_count,
        COUNT(*) as enrollment_count
      FROM OBIA_DW.W_SIA_TERM_ENRLMT_F f
      JOIN OBIA_DW.W_SIA_TERM_D t ON f.TERM_WID = t.ROW_WID
      WHERE f.DELETE_FLG = 'N'
        AND f.X_TERM_ENROLLED_FLAG = 'Y'
        AND t.ACAD_YR IN ('2025', '2026')
      GROUP BY t.ACAD_YR
      ORDER BY t.ACAD_YR DESC
    use_as_onboarding_question: false
    verified_by: System
    verified_at: 1740441600

  - name: average_gpa_by_career
    question: What is the average GPA by academic career?
    sql: |-
      SELECT
        ac.ACAD_CAR_CODE as career,
        ROUND(AVG(f.GRADE_PTS), 2) as average_gpa,
        COUNT(DISTINCT f.SCHOLAR_WID) as student_count
      FROM OBIA_DW.W_SIA_TERM_ENRLMT_F f
      JOIN OBIA_DW.W_SIA_ACAD_CAR_D ac ON f.ACAD_CAR_WID = ac.ROW_WID
      JOIN OBIA_DW.W_SIA_TERM_D t ON f.TERM_WID = t.ROW_WID
      WHERE f.DELETE_FLG = 'N'
        AND f.X_TERM_ENROLLED_FLAG = 'Y'
        AND f.GRADE_PTS IS NOT NULL
        AND t.ACAD_YR = '2026'
      GROUP BY ac.ACAD_CAR_CODE
      ORDER BY average_gpa DESC
    use_as_onboarding_question: false
    verified_by: System
    verified_at: 1740441600

