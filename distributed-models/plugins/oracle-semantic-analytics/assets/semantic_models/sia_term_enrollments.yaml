module_custom_instructions:
  question_categorization: |
    **Data Privacy & Student Information Protection:**
    - Reject questions about specific individual student records or personally identifiable information (names, addresses, SSN, etc.)
    - Redirect to aggregate enrollment trends by program, term, academic level, or demographic groups
    - Encourage role-based analysis: "Show me enrollment trends by academic program" rather than "Show me John Smith's enrollment"
    - Support institutional research questions about enrollment patterns, retention metrics, and aggregate demographics
    - ALWAYS anonymize and aggregate data - never return individual student-level details

    **Academic Context & Terminology Clarification:**
    - When users ask about "students", clarify if they mean: enrolled, active, all students, or prospective
    - For "current term" questions, clarify which academic year and term (Fall/Spring/Summer)
    - When users say "this year", confirm they mean academic year 2026
    - When users say "last year", confirm they mean academic year 2025
    - Encourage time-range queries: "Fall 2024 vs Fall 2025" rather than single snapshots
    - For "enrollment" questions, clarify if they want student count (unique) or enrollment count (can be duplicated)

    **Encouraged Question Types (Institutional Research Focus):**
    - Enrollment trends by academic year, term, career, program, and level
    - New vs returning student analysis and retention patterns
    - Academic load distribution (full-time vs part-time enrollment)
    - Major/minor declaration patterns and program popularity
    - Academic level progression and cohort tracking
    - Year-over-year enrollment comparisons
    - Demographic trends (aggregated only, never individual)
    - Program capacity and growth analysis

    **Out of Scope Questions (Reject Politely):**
    - Individual student grades, GPA, or academic performance details
    - Financial aid amounts, billing, or payment information for individuals
    - Student disciplinary records or conduct issues
    - Health information or disability status
    - Contact information (email, phone, address) for individuals
    - Questions that could identify specific students even through inference

    **Question Redirection Examples:**
    - Instead of "What classes is Student X taking?", suggest "What is the enrollment distribution across academic programs?"
    - Instead of "Show me Student Y's GPA", suggest "What is the average GPA by academic career?"
    - Instead of "Which students are on probation?", suggest "What are the retention trends by academic level?"

    **Scope & Context Guidance:**
    - For vague questions, ask for business context: "Are you analyzing enrollment growth, retention, program capacity, or demographic trends?"
    - Encourage specific time ranges: "last 30 days", "Fall 2026", "year-over-year", "5-year trend"
    - Suggest filtering by meaningful dimensions: academic career, program, level, load, new vs returning
    - Guide toward actionable institutional insights rather than raw data dumps

    **Data Freshness & Currency:**
    - Current academic year is 2026
    - Always clarify which term or academic year is being referenced
    - Explain that enrollment data represents a point-in-time snapshot
    - For trend analysis, suggest comparing similar terms across years (Fall-to-Fall, not Fall-to-Spring)

  sql_generation: |
    **CRITICAL Default Filters (MUST APPLY UNLESS USER EXPLICITLY OVERRIDES):**
    - ALWAYS filter WHERE DELETE_FLG = 'N' (exclude soft-deleted records) in ALL queries on W_SIA_TERM_ENRLMT_F
    - ALWAYS filter WHERE X_TERM_ENROLLED_FLAG = 'Y' (only active enrollments) in ALL queries on W_SIA_TERM_ENRLMT_F
    - These two filters should be the FIRST conditions in your WHERE clause for performance
    - Default pattern: WHERE f.DELETE_FLG = 'N' AND f.X_TERM_ENROLLED_FLAG = 'Y' AND ...
    - Only omit these filters if user explicitly asks for "all records including deleted" or "including inactive enrollments"

    **Academic Year & Term Context:**
    - Current academic year is 2026 (use this as default when user says "this year" or "current year")
    - Previous academic year is 2025 (use when user says "last year" or "previous year")
    - When user says "current term" without specifying, ask for clarification (Fall, Spring, or Summer)
    - Term codes follow pattern: YYYY + term number (e.g., 20263 = Fall 2026, 20261 = Spring 2026, 20262 = Summer 2026)
    - For Fall terms, term code ends in 3; Spring ends in 1; Summer ends in 2

    **Lookup Table Joins (W_DOMAIN_MEMBER_LKP_TL) - CRITICAL PATTERN:**
    - To get human-readable descriptions for codes, ALWAYS join to W_DOMAIN_MEMBER_LKP_TL
    - The description column is DOMAIN_MEMBER_NAME (NOT member_name, NOT name — exactly DOMAIN_MEMBER_NAME)
    - Join pattern:
      LEFT JOIN OBIA_DW.W_DOMAIN_MEMBER_LKP_TL lookup
        ON dimension_table.CODE_COLUMN = lookup.DOMAIN_MEMBER_CODE
        AND lookup.DOMAIN_CODE = 'APPROPRIATE_DOMAIN_CODE'
        AND lookup.LANGUAGE_CODE = 'US'
    - SELECT lookup.DOMAIN_MEMBER_NAME AS <alias>_description
    - Domain codes by dimension:
      * Term: 'SIA_TERM_CODE'
      * Academic Career: 'SIA_ACAD_CAR_CODE'
      * Academic Load: 'SIA_ACAD_LOAD_CODE'
      * Academic Group: 'SIA_ACADEMIC_GROUP_CODE'
      * Academic Level: 'SIA_ACADEMIC_LEVEL_CODE'
      * Academic Organization: 'SIA_ACAD_ORG_CODE'
      * Academic Program: 'SIA_ACAD_PROG_CODE'
      * Academic Plan: 'SIA_ACAD_PLAN_CODE'
      * Academic Sub Plan: 'SIA_ACAD_SPLAN_CODE'
      * Program Status: 'SIA_PROGRAM_STATUS_CODE'

    **W_XACT_TYPE_D Table Usage (CRITICAL - Common Error Point):**
    - W_XACT_TYPE_D stores MULTIPLE dimension types in a single table
    - NEVER query this table without filtering by W_XACT_CODE
    - The only real columns are: XACT_TYPE_CODE, W_XACT_TYPE_CODE (Residency only), ACTIVE_FLG, ROW_WID
    - NEVER reference columns like academic_type, load_description, level_name — they do NOT exist
    - Required filters and fact table FK by dimension:
      * Academic Load:           W_XACT_CODE = 'SIA_ACADEMIC_LOAD_CODE'       FK: ACAD_LOAD_WID
      * Academic Group:          W_XACT_CODE = 'SIA_ACADEMIC_GROUP_CODE'      FK: ACAD_GRP_WID
      * Academic Level (start):  W_XACT_CODE = 'SIA_ACADEMIC_LEVEL_CODE'      FK: STRT_ACAD_LVL_WID
      * Admit Type:              W_XACT_CODE = 'SIA_ADMIT_TYPE_CODE'          FK: ADMIT_TYPE_WID
      * Program Action Reason:   W_XACT_CODE = 'SIA_PROGRAMME_ACTION_REASON'  FK: PROG_ACN_RSN_WID
      * Withdraw Reason:         W_XACT_CODE = 'SIA_WITHDRAW_REASON_CODE'     FK: WITHDRAW_REASON_WID
    - If you forget this filter, you will get mixed data from multiple dimensions (WRONG!)
    - Pattern: JOIN W_XACT_TYPE_D al ON f.ACAD_LOAD_WID = al.ROW_WID AND al.W_XACT_CODE = 'SIA_ACADEMIC_LOAD_CODE'

    **Student Counting - Important Distinction:**
    - COUNT(SCHOLAR_WID): Total enrollment count (can count same student multiple times across terms)
    - COUNT(DISTINCT SCHOLAR_WID): Unique student count (counts each student once regardless of terms)
    - When user asks "how many students", use COUNT(DISTINCT SCHOLAR_WID)
    - When user asks "total enrollments" or "enrollment count", use COUNT(*)
    - Always clarify which is being returned in column alias: student_count vs enrollment_count

    **Multiple Majors/Minors Handling:**
    - Students can have up to 4 majors: X_MAJOR_1_WID, X_MAJOR_2_WID, X_MAJOR_3_WID, X_MAJOR_4_WID
    - Students can have up to 3 minors: X_MINOR_1_WID, X_MINOR_2_WID, X_MINOR_3_WID
    - Students can have up to 4 sub-plans: X_SUBPLAN_1_WID through X_SUBPLAN_4_WID
    - When user asks "show me majors", you need to handle all 4 major columns
    - Approach 1 (preferred): UNION across major columns
    - Approach 2: Show as separate columns (major_1, major_2, etc.)
    - Example UNION pattern:
      SELECT SCHOLAR_WID, 1 as major_rank, X_MAJOR_1_WID as major_wid FROM ... WHERE X_MAJOR_1_WID IS NOT NULL
      UNION ALL
      SELECT SCHOLAR_WID, 2, X_MAJOR_2_WID FROM ... WHERE X_MAJOR_2_WID IS NOT NULL
      ...

    **Filtering Out System/Placeholder Values:**
    - Always exclude __NOT_APPLICABLE__ and __UNASSIGNED__ values in dimensions
    - Pattern: WHERE code_column NOT IN ('__NOT_APPLICABLE__', '__UNASSIGNED__')
    - Apply this to: academic career, program, plan, organization, status codes

    **Oracle-Specific SQL Syntax:**
    - Date functions: TRUNC(SYSDATE), ADD_MONTHS(date, -1), TO_DATE('YYYY-MM-DD', 'YYYY-MM-DD')
    - For top N queries: Use FETCH FIRST N ROWS ONLY (Oracle 12c+), NOT LIMIT
    - String concatenation: Use CONCAT(str1, str2) or || operator
    - Null handling: Use NVL(column, default_value) or COALESCE(column, default)
    - Current date: SYSDATE (not CURRENT_DATE)

    **Fully Qualified Object Names:**
    - ALWAYS use fully qualified names: OBIA_DW.TABLE_NAME format
    - Example: OBIA_DW.W_SIA_TERM_ENRLMT_F, not just W_SIA_TERM_ENRLMT_F
    - This ensures clarity and prevents ambiguity

    **Table Aliases - Use Consistent Conventions:**
    - f = fact table (W_SIA_TERM_ENRLMT_F)
    - t = term dimension (W_SIA_TERM_D)
    - s = scholar/student dimension (W_SIA_SCHOLAR_D)
    - ac = academic career (W_SIA_ACAD_CAR_D)
    - al = academic load (W_XACT_TYPE_D for load)
    - ag = academic group (W_XACT_TYPE_D for group)
    - lvl = academic level (W_XACT_TYPE_D for level)
    - org = academic organization (W_SIA_ACAD_ORG_D)
    - prog = academic program (W_SIA_ACAD_PROG_D)
    - plan = academic plan (W_SIA_ACAD_PLAN_D)
    - splan = academic sub plan (W_SIA_ACAD_SPLAN_D)
    - stat = program status (W_STATUS_D)
    - lookup = lookup table (W_DOMAIN_MEMBER_LKP_TL)

    **Column Naming Conventions:**
    - Use lowercase with underscores: student_count, enrollment_count, academic_year
    - Include units or context in name: student_count (not just count), average_gpa (not just average)
    - For percentages: Include 'percentage' or 'rate' in name: retention_rate, completion_percentage

    **Numeric Formatting:**
    - Round percentages to 2 decimals: ROUND((numerator / NVL(denominator, 1)) * 100, 2)
    - Round GPA to 2 decimals: ROUND(AVG(GRADE_PTS), 2)
    - Format counts as integers: COUNT(*), COUNT(DISTINCT col)
    - Use NVL or NULLIF to prevent division by zero: col1 / NVL(col2, 1)

    **VARCHAR Columns Used in Numeric Aggregations (CRITICAL - Prevents ORA-01722):**
    - Some columns are physically VARCHAR2 in Oracle but semantically numeric (e.g., GPA, scores, rates)
    - Before applying numeric aggregations (AVG, SUM, MIN, MAX) on a VARCHAR2 column, ALWAYS wrap with:
      TO_NUMBER(column DEFAULT NULL ON CONVERSION ERROR)
    - This silently converts invalid/non-numeric values to NULL, which aggregations skip automatically
    - Check data_type in the semantic model — if it says VARCHAR2 but you are applying AVG/SUM/MIN/MAX, apply this cast
    - Do NOT apply this cast for string operations: LISTAGG, CONCAT, analytical functions (RANK, ROW_NUMBER, LAG, etc.), GROUP BY, ORDER BY, or WHERE filters — use the raw column for those
    - Known columns requiring this treatment when aggregating:
      * s.X_MOST_RECENT_CUMGPA → AVG(TO_NUMBER(s.X_MOST_RECENT_CUMGPA DEFAULT NULL ON CONVERSION ERROR))

    **Performance Optimization:**
    - Always put DELETE_FLG = 'N' and X_TERM_ENROLLED_FLAG = 'Y' FIRST in WHERE clause
    - Limit date ranges when possible: t.ACAD_YR IN ('2025', '2026') is better than t.ACAD_YR > '2020'
    - Use EXISTS instead of IN for subqueries when checking existence
    - Avoid SELECT * - specify only needed columns
    - For exploratory queries, add FETCH FIRST 100 ROWS ONLY

    **Handling NULL Values:**
    - In joins, use LEFT JOIN when dimension record might not exist
    - In aggregations, decide if NULL should be 0 or excluded
    - For counts, NULL is excluded automatically (COUNT ignores NULLs)
    - For sums/averages, use NVL(column, 0) if you want NULLs as zeros

    **Date Comparisons & Ranges:**
    - Use DATE_TRUNC or TRUNC for period-based aggregations
    - For "last month": WHERE TRUNC(date_col, 'MM') = TRUNC(ADD_MONTHS(SYSDATE, -1), 'MM')
    - For "this year": WHERE t.ACAD_YR = '2026'
    - For date ranges: Use BETWEEN or >= AND < pattern

    **Sorting & Ordering:**
    - For enrollment counts: ORDER BY student_count DESC (largest first)
    - For time series: ORDER BY academic_year, term_code (chronological)
    - For alphabetical: ORDER BY description, name (use dimension description not code)
    - Include NULL handling if needed: ORDER BY column NULLS LAST
