verified_queries:
  - id: verified.total_enrollment_current_year
    question: What is the total enrollment for the current academic year?
    measures:
      - measure.student_count
      - measure.enrollment_count
    dimensions: []
    filters:
      - filter.active_enrollment
      - filter.current_academic_year
    sql_oracle19c: |-
      SELECT
        COUNT(DISTINCT f.SCHOLAR_WID) AS student_count,
        COUNT(*) AS enrollment_count
      FROM OBIA_DW.W_SIA_TERM_ENRLMT_F f
      JOIN OBIA_DW.W_SIA_TERM_D t ON f.TERM_WID = t.ROW_WID
      WHERE f.DELETE_FLG = 'N'
        AND f.X_TERM_ENROLLED_FLAG = 'Y'
        AND t.ACAD_YR = '2026'
      FETCH FIRST 100 ROWS ONLY
    verified_by: System
    verified_at: '2026-05-01'

  - id: verified.student_count_by_academic_year
    question: Get student enrollment count by academic year for 2024 through 2026.
    measures:
      - measure.student_count
    dimensions:
      - dimension.academic_year
    filters:
      - filter.active_enrollment
    sql_oracle19c: |-
      SELECT
        t.ACAD_YR AS academic_year,
        COUNT(DISTINCT f.SCHOLAR_WID) AS student_count
      FROM OBIA_DW.W_SIA_TERM_ENRLMT_F f
      JOIN OBIA_DW.W_SIA_TERM_D t ON f.TERM_WID = t.ROW_WID
      WHERE f.DELETE_FLG = 'N'
        AND f.X_TERM_ENROLLED_FLAG = 'Y'
        AND t.ACAD_YR IN ('2024', '2025', '2026')
      GROUP BY t.ACAD_YR
      ORDER BY t.ACAD_YR
      FETCH FIRST 100 ROWS ONLY
    verified_by: System
    verified_at: '2026-05-28'

  - id: verified.enrollment_by_academic_career
    question: Show enrollment by academic career for academic year 2026.
    measures:
      - measure.student_count
      - measure.enrollment_count
    dimensions:
      - dimension.academic_career
    filters:
      - filter.active_enrollment
      - filter.current_academic_year
    sql_oracle19c: |-
      SELECT
        ac.ACAD_CAR_CODE AS career_code,
        COUNT(DISTINCT f.SCHOLAR_WID) AS student_count,
        COUNT(*) AS enrollment_count
      FROM OBIA_DW.W_SIA_TERM_ENRLMT_F f
      JOIN OBIA_DW.W_SIA_ACAD_CAR_D ac ON f.ACAD_CAR_WID = ac.ROW_WID
      JOIN OBIA_DW.W_SIA_TERM_D t ON f.TERM_WID = t.ROW_WID
      WHERE f.DELETE_FLG = 'N'
        AND f.X_TERM_ENROLLED_FLAG = 'Y'
        AND t.ACAD_YR = '2026'
      GROUP BY ac.ACAD_CAR_CODE
      ORDER BY student_count DESC
      FETCH FIRST 100 ROWS ONLY
    verified_by: System
    verified_at: '2026-05-01'
