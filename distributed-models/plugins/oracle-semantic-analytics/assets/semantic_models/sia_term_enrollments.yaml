name: SIA_TERM_ENROLLMENTS
description: Student Information Analytics semantic model for term enrollment analysis. Provides comprehensive enrollment data including student demographics, academic programs, major/minor declarations, academic load, and new vs returning student tracking. Optimized for institutional research, enrollment management, and academic planning queries.

tables:
  # ============================================================================
  # FACT TABLE: Term Enrollment
  # ============================================================================
  - name: term_enrollment_fact
    synonyms:
      - enrollments
      - student enrollments
      - term records
      - enrollment transactions
    description: Core fact table containing term enrollment records for each student-term combination. Includes academic program associations, enrollment status, and grade information. Each row represents one student's enrollment in one academic term.
    base_table:
      database: OBIA_DW
      schema: OBIA_DW
      table: W_SIA_TERM_ENRLMT_F

    dimensions:
      - name: new_returning_student
        synonyms:
          - student type
          - new or returning
          - enrollment type
          - first time or continuing
        description: Indicates whether the student is New (first-time) or Returning (continuing) for this specific term. Critical for new student enrollment tracking and retention analysis.
        expr: X_NEW_RETURNING
        data_type: VARCHAR2(20)
        sample_values:
          - New
          - Returning

      - name: term_enrolled_flag
        synonyms:
          - enrolled
          - active enrollment
          - enrollment status
        description: Flag indicating if the student is actively enrolled in the term (Y=Yes, N=No). Use this to filter for active enrollments.
        expr: X_TERM_ENROLLED_FLAG
        data_type: VARCHAR2(1)
        sample_values:
          - Y
          - N

      - name: delete_flag
        synonyms:
          - deleted
          - soft delete
          - record status
        description: Soft delete flag. N=Active record, Y=Deleted record. Always filter for N to exclude deleted records.
        expr: DELETE_FLG
        data_type: VARCHAR2(1)
        sample_values:
          - N
          - Y

      - name: enrollment_status
        synonyms:
          - enroll status
          - student enrollment status
        description: Student enrollment status code for the term
        expr: X_ENRL_STATUS
        data_type: VARCHAR2(20)

      - name: leave_of_absence_flag
        synonyms:
          - LOA
          - on leave
          - leave flag
        description: Flag indicating if the student is on a Leave of Absence (Y/N)
        expr: X_LOA_FLAG
        data_type: VARCHAR2(1)
        sample_values:
          - Y
          - N

      - name: most_recent_term_flag
        synonyms:
          - latest term
          - current term flag
          - most recent quarter flag
        description: Flag indicating if this is the most recent term record for the student
        expr: X_MOST_RECENT_QTR_FLAG
        data_type: VARCHAR2(1)
        sample_values:
          - Y
          - N

      - name: phd_flag
        synonyms:
          - doctoral flag
          - doctorate
          - PhD student
        description: Flag indicating if the student is a PhD student (Y/N)
        expr: X_PHD_FLAG
        data_type: VARCHAR2(1)
        sample_values:
          - Y
          - N

      - name: study_away_flag
        synonyms:
          - studying abroad
          - study abroad flag
          - away program
        description: Flag indicating if the student is in a study away program (Y/N)
        expr: X_STUDY_AWAY_FLAG
        data_type: VARCHAR2(1)
        sample_values:
          - Y
          - N

      - name: primary_career_flag
        synonyms:
          - primary career
          - main career flag
        description: Flag indicating if this enrollment record is for the student's primary academic career
        expr: X_PRIM_CAREER_FLG
        data_type: VARCHAR2(1)
        sample_values:
          - Y
          - N

      - name: study_agreement_code
        synonyms:
          - study agreement
          - agreement code
        description: Study agreement code for the enrollment
        expr: STUDY_AGREEMENT
        data_type: VARCHAR2(20)

      - name: study_agreement_description
        synonyms:
          - study agreement name
          - agreement description
        description: Human-readable description of the study agreement
        expr: X_STUDY_AGREEMENT_DESCR
        data_type: VARCHAR2(100)

      - name: eligibility_to_enroll
        synonyms:
          - eligible to enroll
          - enrollment eligibility
        description: Eligibility to enroll indicator for the student
        expr: ELIG_TO_ENROLL
        data_type: VARCHAR2(20)

    time_dimensions:
      - name: enrollment_date
        synonyms:
          - enrollment timestamp
          - when enrolled
        description: Timestamp when the enrollment record was created
        expr: INTEGRATION_ID
        data_type: TIMESTAMP

      - name: admit_session_begin_date
        synonyms:
          - admit date
          - session start date
          - admit term begin
        description: Begin date of the admit term session
        expr: X_ADMIT_SESSION_BEG_DT
        data_type: DATE

      - name: degree_conferral_date
        synonyms:
          - graduation date
          - degree awarded date
          - conferral date
        description: Date when the degree was conferred (graduation date)
        expr: X_CONF_DT
        data_type: DATE

    facts:
      - name: scholar_wid
        description: Warehouse identifier for the student (foreign key to scholar dimension)
        expr: SCHOLAR_WID
        data_type: NUMBER(18,0)

      - name: term_wid
        description: Warehouse identifier for the term (foreign key to term dimension)
        expr: TERM_WID
        data_type: NUMBER(18,0)

      - name: academic_career_wid
        description: Warehouse identifier for academic career (foreign key)
        expr: ACAD_CAR_WID
        data_type: NUMBER(18,0)

      - name: academic_group_wid
        description: Warehouse identifier for academic group (foreign key)
        expr: ACAD_GRP_WID
        data_type: NUMBER(18,0)

      - name: academic_load_wid
        description: Warehouse identifier for academic load (foreign key)
        expr: ACAD_LOAD_WID
        data_type: NUMBER(18,0)

      - name: academic_level_wid
        description: Warehouse identifier for academic level at term start (foreign key)
        expr: STRT_ACAD_LVL_WID
        data_type: NUMBER(18,0)

      - name: academic_org_wid
        description: Warehouse identifier for academic organization (foreign key)
        expr: ACAD_ORG_WID
        data_type: NUMBER(18,0)

      - name: primary_academic_program_wid
        description: Warehouse identifier for primary academic program (foreign key)
        expr: PRI_ACAD_PROG_WID
        data_type: NUMBER(18,0)

      - name: program_status_wid
        description: Warehouse identifier for program enrollment status (foreign key)
        expr: PROG_STAT_WID
        data_type: NUMBER(18,0)

      - name: major_1_wid
        description: Warehouse identifier for first major (foreign key to academic plan)
        expr: X_MAJOR_1_WID
        data_type: NUMBER(18,0)

      - name: major_2_wid
        description: Warehouse identifier for second major (foreign key to academic plan)
        expr: X_MAJOR_2_WID
        data_type: NUMBER(18,0)

      - name: major_3_wid
        description: Warehouse identifier for third major (foreign key to academic plan)
        expr: X_MAJOR_3_WID
        data_type: NUMBER(18,0)

      - name: major_4_wid
        description: Warehouse identifier for fourth major (foreign key to academic plan)
        expr: X_MAJOR_4_WID
        data_type: NUMBER(18,0)

      - name: minor_1_wid
        description: Warehouse identifier for first minor (foreign key to academic plan)
        expr: X_MINOR_1_WID
        data_type: NUMBER(18,0)

      - name: minor_2_wid
        description: Warehouse identifier for second minor (foreign key to academic plan)
        expr: X_MINOR_2_WID
        data_type: NUMBER(18,0)

      - name: minor_3_wid
        description: Warehouse identifier for third minor (foreign key to academic plan)
        expr: X_MINOR_3_WID
        data_type: NUMBER(18,0)

      - name: subplan_1_wid
        description: Warehouse identifier for first sub-plan/concentration (foreign key)
        expr: X_SUBPLAN_1_WID
        data_type: NUMBER(18,0)

      - name: subplan_2_wid
        description: Warehouse identifier for second sub-plan/concentration (foreign key)
        expr: X_SUBPLAN_2_WID
        data_type: NUMBER(18,0)

      - name: subplan_3_wid
        description: Warehouse identifier for third sub-plan/concentration (foreign key)
        expr: X_SUBPLAN_3_WID
        data_type: NUMBER(18,0)

      - name: subplan_4_wid
        description: Warehouse identifier for fourth sub-plan/concentration (foreign key)
        expr: X_SUBPLAN_4_WID
        data_type: NUMBER(18,0)

      - name: grade_points
        synonyms:
          - grade pts
          - gpa points
          - quality points
        description: Grade points earned for this enrollment. Used to calculate GPA.
        expr: GRADE_PTS
        data_type: NUMBER(10,2)
        sample_values:
          - 4.0
          - 3.5
          - 0.0

      - name: current_gpa
        synonyms:
          - term GPA
          - current term gpa
          - semester GPA
        description: The current term's student GPA for an academic career
        expr: CUR_GPA_PTS
        data_type: NUMBER(10,4)

      - name: cumulative_gpa
        synonyms:
          - cum GPA
          - overall GPA
          - total GPA
          - cumulative grade point average
        description: Student's cumulative GPA for an academic career
        expr: CUM_GPA_PTS
        data_type: NUMBER(10,4)

      - name: course_count
        synonyms:
          - number of courses
          - courses taken
          - class count
        description: The number of courses the student took during the specified term
        expr: CRSE_CNT
        data_type: NUMBER(10,0)

      - name: units_taken_in_progress
        synonyms:
          - credit hours attempted
          - units attempted
          - credit hours for term
        description: Units taken in progress for the term (credit hours attempted)
        expr: TAKEN_PRGRS_UNIT
        data_type: NUMBER(10,2)

      - name: units_taken_for_gpa
        synonyms:
          - GPA units taken
          - units toward GPA
        description: Units taken that count toward the grade point average
        expr: TAKEN_GPA_UNIT
        data_type: NUMBER(10,2)

      - name: units_taken_non_gpa
        synonyms:
          - non-GPA units taken
          - units not toward GPA
        description: Units taken that do not count toward the grade point average
        expr: TAKEN_NON_GPA_UNIT
        data_type: NUMBER(10,2)

      - name: units_passed_in_progress
        synonyms:
          - credit hours earned
          - units earned
          - units passed
        description: Units passed in progress for the term (credit hours earned)
        expr: PASSD_PRGRS_UNIT
        data_type: NUMBER(10,2)

      - name: units_passed_for_gpa
        synonyms:
          - GPA units passed
          - units passed toward GPA
        description: Units passed that count toward the grade point average
        expr: PASSD_GPA_UNIT
        data_type: NUMBER(10,2)

      - name: units_passed_non_gpa
        synonyms:
          - non-GPA units passed
        description: Units passed that do not count toward the grade point average
        expr: PASSD_NON_GPA_UNIT
        data_type: NUMBER(10,2)

      - name: units_in_progress_gpa
        synonyms:
          - in-progress GPA units
        description: Units currently in progress that count toward grade point average
        expr: PRGRS_GPA_UNIT
        data_type: NUMBER(10,2)

      - name: units_in_progress_non_gpa
        synonyms:
          - in-progress non-GPA units
        description: Units currently in progress that do not count toward grade point average
        expr: PRGRS_NON_GPA_UNIT
        data_type: NUMBER(10,2)

      - name: total_term_units
        synonyms:
          - total units
          - total credit hours
        description: The total number of units taken in the term or year
        expr: TOT_TERM_UNIT
        data_type: NUMBER(10,2)

      - name: units_transferred
        synonyms:
          - transfer units
          - transferred credits
        description: Units transferred from another institution
        expr: XFER_UNIT
        data_type: NUMBER(10,2)

      - name: total_earned_credit
        synonyms:
          - total credits earned
          - total passed units
          - earned credits institution
        description: Total earned credit for the institution (cumulative units passed)
        expr: X_TOT_PASSD_PRGRSS
        data_type: NUMBER(10,2)

      - name: total_attempted_credits
        synonyms:
          - total credits attempted
          - total taken units
          - attempted credits institution
        description: Total attempted credits for the institution (cumulative units taken)
        expr: X_TOT_TAKEN_PRGRSS
        data_type: NUMBER(10,2)

      - name: time_to_degree_days
        synonyms:
          - days to graduate
          - TTD days
        description: Time to degree in days from admit to degree conferral
        expr: X_TTD_DAYS
        data_type: NUMBER(10,0)

      - name: time_to_degree_days
        synonyms:
          - days to graduate
          - TTD days
        description: Time to degree in days from admit to degree conferral
        expr: X_TTD_DAYS
        data_type: NUMBER(10,0)

      - name: time_to_degree_years
        synonyms:
          - years to graduate
          - TTD years
        description: Time to degree in years from admit to degree conferral
        expr: X_TTD_YEARS
        data_type: NUMBER(10,2)

      - name: student_career_number
        synonyms:
          - career number
          - student career num
        description: The student career number distinguishing multiple career records for the same student
        expr: STDNT_CAR_NUM
        data_type: NUMBER(5,0)

      - name: units_audited
        synonyms:
          - audit units
          - audited hours
        description: Total number of credit hours taken on an audit-grading basis
        expr: UNT_AUDIT
        data_type: NUMBER(10,2)

      - name: total_cumulative_units
        synonyms:
          - cumulative units
          - total cumulative credits
        description: Cumulative total of credit hours passed (all-time)
        expr: TOT_CUMULATIVE
        data_type: NUMBER(10,2)

      - name: max_total_units
        synonyms:
          - maximum units
          - max credit hours
        description: Maximum number of units the student can enroll in for the term
        expr: MAX_TOT_UNIT
        data_type: NUMBER(10,2)

      - name: min_total_units
        synonyms:
          - minimum units
          - min credit hours
        description: Minimum number of units the student can enroll in for the term
        expr: MIN_TOT_UNIT
        data_type: NUMBER(10,2)

      - name: transfer_grade_points
        synonyms:
          - transfer GPA points
          - xfer grade points
        description: Total transfer grade points
        expr: TRF_GRADE_POINTS
        data_type: NUMBER(10,2)

      - name: transfer_units_passed_gpa
        synonyms:
          - transfer units toward GPA
          - transfer credit passed GPA
        description: Total number of transfer credit units passed that count toward GPA
        expr: TRF_PASSED_GPA
        data_type: NUMBER(10,2)

      - name: transfer_units_taken_gpa
        synonyms:
          - transfer units taken toward GPA
        description: Total transfer credit units taken that count toward GPA
        expr: TRF_TAKEN_GPA
        data_type: NUMBER(10,2)

      - name: cumulative_resident_terms
        synonyms:
          - cum resident terms
          - total resident terms
        description: Cumulative resident terms completed
        expr: CUM_RESIDENT_TERMS
        data_type: NUMBER(5,0)

    filters:
      - name: ActiveEnrollments
        synonyms:
          - active students
          - enrolled students
          - current enrollments
          - not deleted
        description: Filter for active enrollment records only (not deleted and enrolled flag is Y). This is the most common filter and should be applied to most enrollment queries.
        expr: DELETE_FLG = 'N' AND X_TERM_ENROLLED_FLAG = 'Y'

      - name: NewStudents
        synonyms:
          - first time students
          - new admits
          - first year
        description: Filter for new (first-time) students only
        expr: X_NEW_RETURNING = 'New' AND DELETE_FLG = 'N' AND X_TERM_ENROLLED_FLAG = 'Y'

      - name: ReturningStudents
        synonyms:
          - continuing students
          - returning enrollments
        description: Filter for returning (continuing) students only
        expr: X_NEW_RETURNING = 'Returning' AND DELETE_FLG = 'N' AND X_TERM_ENROLLED_FLAG = 'Y'

    metrics:
      - name: enrollment_count
        synonyms:
          - total enrollments
          - enrollment records
          - number of enrollments
        description: Total count of enrollment records. Note this can count the same student multiple times if they are enrolled in multiple terms.
        expr: COUNT(*)

      - name: student_count
        synonyms:
          - unique students
          - distinct students
          - number of students
          - total students
          - how many students
        description: Count of unique/distinct students. Use this when asking 'how many students'.
        expr: COUNT(DISTINCT SCHOLAR_WID)

      - name: average_grade_points
        synonyms:
          - avg gpa
          - mean grade points
          - average gpa
        description: Average grade points across enrollments
        expr: AVG(GRADE_PTS)

      - name: total_grade_points
        synonyms:
          - sum of grade points
          - total quality points
        description: Sum of all grade points
        expr: SUM(GRADE_PTS)

  # ============================================================================
  # DIMENSION: Scholar (Student)
  # ============================================================================
  - name: scholar
    synonyms:
      - students
      - learners
      - pupils
    description: Student master dimension containing demographic and identification information for each student in the system.
    base_table:
      database: OBIA_DW
      schema: OBIA_DW
      table: W_SIA_SCHOLAR_D

    dimensions:
      - name: scholar_id
        synonyms:
          - student number
          - student id
          - scholar number
          - student identifier
        description: Source system student identification number. This is the business key visible to end users.
        expr: SCHOLAR_ID
        data_type: VARCHAR2(50)

      - name: row_wid
        description: Warehouse surrogate key for the scholar dimension (primary key)
        expr: ROW_WID
        data_type: NUMBER(18,0)

      - name: chicago_id
        synonyms:
          - uchicago id
          - campus id
          - chicago identifier
        description: University of Chicago campus ID for the student
        expr: X_CHICAGO_ID
        data_type: VARCHAR2(20)

      - name: uchicago_email
        synonyms:
          - student email
          - university email
          - uchi email
        description: UChicago institutional email address for the student
        expr: X_UCHI_EMAIL
        data_type: VARCHAR2(100)

      - name: gender_code
        synonyms:
          - gender
          - sex
        description: Source system gender code for the student
        expr: GENDER_CODE
        data_type: VARCHAR2(20)

      - name: date_of_birth
        synonyms:
          - birth date
          - DOB
          - birthday
        description: Student date of birth
        expr: BIRTH_DT
        data_type: DATE

      - name: age
        synonyms:
          - student age
          - years old
        description: Current age of the student in years
        expr: X_AGE
        data_type: NUMBER(5,0)

      - name: ferpa_flag
        synonyms:
          - FERPA
          - privacy flag
          - ferpa restriction
        description: Flag indicating if student has a FERPA privacy restriction (Y/N)
        expr: FERPA_FLG
        data_type: VARCHAR2(1)
        sample_values:
          - Y
          - N

      - name: athlete_flag
        synonyms:
          - athlete
          - student athlete
        description: Flag indicating if the student is a registered athlete (Y/N)
        expr: ATHLETE_FLAG
        data_type: VARCHAR2(1)
        sample_values:
          - Y
          - N

      - name: urm_flag
        synonyms:
          - underrepresented minority
          - URM
          - minority flag
        description: Flag indicating if the student is an underrepresented minority (Y/N)
        expr: X_URM_FLAG
        data_type: VARCHAR2(1)
        sample_values:
          - Y
          - N

      - name: most_recent_cumulative_gpa
        synonyms:
          - latest cum GPA
          - current cumulative GPA
          - most recent GPA
        description: Most recent cumulative GPA across all academic careers (stored as VARCHAR2 — apply safe cast when aggregating)
        expr: X_MOST_RECENT_CUMGPA
        data_type: VARCHAR2(10)

      - name: most_recent_term
        synonyms:
          - latest term
          - last enrolled term
        description: Term code of the student's most recent enrollment
        expr: X_MOST_RECENT_TERM
        data_type: VARCHAR2(20)

    facts: []
    time_dimensions: []
    filters: []
    metrics: []

  # ============================================================================
  # DIMENSION: Term
  # ============================================================================
  - name: term
    synonyms:
      - academic term
      - semester
      - quarter
      - session
    description: Academic term dimension containing term codes, descriptions, and academic year information. Represents the time period when courses are offered.
    base_table:
      database: OBIA_DW
      schema: OBIA_DW
      table: W_SIA_TERM_D

    dimensions:
      - name: term_code
        synonyms:
          - term
          - term id
          - source term code
        description: Source system term code (e.g., 20263 for Fall 2026)
        expr: TERM_CODE
        data_type: VARCHAR2(20)
        sample_values:
          - '20263'
          - '20261'
          - '20252'

      - name: term_description
        synonyms:
          - term name
          - semester name
        description: Human-readable term description retrieved from lookup table
        expr: TERM_CODE
        data_type: VARCHAR2(100)
        sample_values:
          - Fall 2026
          - Spring 2026
          - Summer 2025

      - name: academic_year
        synonyms:
          - year
          - acad year
          - fiscal year
        description: Academic year for the term (e.g., 2026)
        expr: ACAD_YR
        data_type: VARCHAR2(4)
        sample_values:
          - '2026'
          - '2025'
          - '2024'

      - name: institution_code
        synonyms:
          - institution
          - campus code
        description: Institution or campus code for the term
        expr: INSTITUTION_CODE
        data_type: VARCHAR2(20)

      - name: row_wid
        description: Warehouse surrogate key for the term dimension (primary key)
        expr: ROW_WID
        data_type: NUMBER(18,0)

      - name: current_flag
        synonyms:
          - is current term
          - active term flag
        description: Flag indicating if this is the current active term (Y/N)
        expr: CURRENT_FLG
        data_type: VARCHAR2(1)
        sample_values:
          - Y
          - N

      - name: term_category_code
        synonyms:
          - term type
          - semester type
        description: Code identifying the term category (e.g., Fall, Spring, Summer)
        expr: TERM_CTGRY_CODE
        data_type: VARCHAR2(20)

      - name: academic_career_code
        synonyms:
          - term career
          - career for term
        description: Academic career code associated with the term
        expr: ACAD_CAR_CODE
        data_type: VARCHAR2(20)

    time_dimensions:
      - name: term_begin_date
        synonyms:
          - term start date
          - semester start
        description: Date on which the term begins
        expr: TERM_BEGIN_DT
        data_type: DATE

      - name: term_end_date
        synonyms:
          - term end
          - semester end date
        description: Date on which the term ends
        expr: TERM_END_DT
        data_type: DATE

      - name: sixty_pct_date
        synonyms:
          - 60 percent date
          - census date
        description: Date representing the sixty percent point of the term (used for financial aid)
        expr: SIXTY_PCT_DT
        data_type: DATE

    facts: []

    filters:
      - name: CurrentYear
        synonyms:
          - this year
          - current academic year
        description: Filter for current academic year (2026)
        expr: ACAD_YR = '2026'

      - name: LastYear
        synonyms:
          - previous year
          - prior academic year
        description: Filter for previous academic year (2025)
        expr: ACAD_YR = '2025'

    metrics: []

  # ============================================================================
  # DIMENSION: Academic Career
  # ============================================================================
  - name: academic_career
    synonyms:
      - career
      - academic level
      - degree level
    description: Academic career dimension indicating the level of study (Undergraduate, Graduate, Professional, etc.)
    base_table:
      database: OBIA_DW
      schema: OBIA_DW
      table: W_SIA_ACAD_CAR_D

    dimensions:
      - name: academic_career_code
        synonyms:
          - career code
        description: Source system academic career code
        expr: ACAD_CAR_CODE
        data_type: VARCHAR2(20)
        sample_values:
          - UGRD
          - GRAD
          - PROF

      - name: academic_career_description
        synonyms:
          - career name
          - academic career
          - source academic career
        description: Human-readable academic career description (Undergraduate, Graduate, Professional)
        expr: ACAD_CAR_CODE
        data_type: VARCHAR2(100)
        sample_values:
          - Undergraduate
          - Graduate
          - Professional

      - name: row_wid
        description: Warehouse surrogate key (primary key)
        expr: ROW_WID
        data_type: NUMBER(18,0)

    time_dimensions: []
    facts: []
    filters: []
    metrics: []

  # ============================================================================
  # DIMENSION: Academic Load
  # ============================================================================
  - name: academic_load
    synonyms:
      - load
      - enrollment intensity
      - credit load
    description: Academic load dimension indicating whether a student is enrolled Full-time, Part-time, Three-Quarter Time, or Half-time. Stored in W_XACT_TYPE_D with W_XACT_CODE filter.
    base_table:
      database: OBIA_DW
      schema: OBIA_DW
      table: W_XACT_TYPE_D

    dimensions:
