routes:
  - id: student_enrollment
    name: Student Enrollment Analytics
    semantic_model: assets/semantic_models/sia_term_enrollments.yaml
    description: Student Information Analytics term enrollment questions using a platform-agnostic semantic contract with an Oracle 19c physical mapping.
    keywords:
      - student
      - students
      - enrollment
      - enrollments
      - enrolled
      - academic term
      - term
      - academic program
      - program
      - academic career
      - career
      - major
      - minor
      - academic load
      - new student
      - returning student
    default_metric_candidates:
      - student_count
      - enrollment_count
    required_filters:
      - DELETE_FLG = 'N'
      - X_TERM_ENROLLED_FLAG = 'Y'
